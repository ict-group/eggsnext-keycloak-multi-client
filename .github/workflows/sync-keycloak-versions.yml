name: Sync Keycloak Versions

on:
  schedule:
    # Ogni giorno alle 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Fetch Keycloak versions
        id: fetch
        run: |
          python3 << 'PYTHON_EOF'
          import requests
          import json
          
          print("🔄 Recuperando versioni da Quay.io...")
          
          try:
              response = requests.get(
                  'https://quay.io/api/v1/repository/keycloak/keycloak/tag?limit=100',
                  timeout=10
              )
              response.raise_for_status()
          
              # Estrai versioni stabili (X.Y.Z)
              tags = response.json().get('tags', [])
              versions = []
          
              for tag in tags:
                  name = tag.get('name', '')
                  # Filtra solo versioni stabili (X.Y.Z)
                  if name and name[0].isdigit() and name.count('.') == 2:
                      # Esclude alpha, beta, rc
                      if not any(x in name.lower() for x in ['alpha', 'beta', 'rc', 'dev']):
                          versions.append(name)
          
              # Ordina e prendi i top 15
              versions = sorted(
                  set(versions),
                  key=lambda x: tuple(map(int, x.split('.'))),
                  reverse=True
              )[:15]
          
              # Scrivi in file per usare in GitHub Actions
              with open('/tmp/versions.txt', 'w') as f:
                  for v in versions:
                      f.write(f'{v}\n')
          
              print(f"✅ {len(versions)} versioni trovate:")
              for v in versions:
                  print(f"   - {v}")
          
          except Exception as e:
              print(f"❌ Errore: {e}")
              exit(1)
          PYTHON_EOF

      - name: Update workflow YAML
        run: |
          python3 << 'PYTHON_EOF'
          import yaml
          
          # Leggi le versioni
          with open('/tmp/versions.txt', 'r') as f:
              versions = [line.strip() for line in f if line.strip()]
          
          # Leggi il workflow
          workflow_path = '.github/workflows/build-image.yml'
          with open(workflow_path, 'r') as f:
              workflow = yaml.safe_load(f)
          
          # Aggiorna le opzioni
          old_versions = workflow['on']['workflow_dispatch']['inputs']['keycloak_version']['options']
          workflow['on']['workflow_dispatch']['inputs']['keycloak_version']['options'] = versions
          
          # Scrivi il file
          with open(workflow_path, 'w') as f:
              yaml.dump(
                  workflow,
                  f,
                  default_flow_style=False,
                  sort_keys=False,
                  allow_unicode=True
              )
          
          print(f"✅ Workflow aggiornato: {len(old_versions)} → {len(versions)} versioni")
          PYTHON_EOF

      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet .github/workflows/build-image.yml; then
            echo "✅ Nessun aggiornamento necessario"
          else
            echo "📝 Versioni aggiornate, effettuo push..."
            git add .github/workflows/build-image.yml
            git commit -m "chore: update Keycloak versions ($(date +%Y-%m-%d))"
            git push
            echo "✅ Push completato!"
          fi