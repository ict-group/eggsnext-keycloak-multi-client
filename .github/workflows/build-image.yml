name: Build Keycloak Images
on:
  push:
    branches:
      - main
    paths:
      - 'clienti/**'
  workflow_dispatch:
    inputs:
      client:
        description: 'Seleziona cliente'
        required: true
        type: choice
        options:
          - all
          - errevi
          - errezeta
          - papalini
          - poma
      keycloak_version:
        description: 'Seleziona versione Keycloak'
        required: true
        type: choice
        options:
          - 26.6.1
          - 25.0.6
          - 24.0.5
          - 23.0.7
          - 22.0.5
          - 21.1.2
          - 20.0.5
          - 19.0.3
          - 18.0.2

env:
  REGISTRY: ghcr.io

jobs:
  fetch-clients:
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.clients.outputs.list }}
    steps:
      - uses: actions/checkout@v4
      - name: List clients
        id: clients
        run: |
          CLIENTS=$(ls -d clienti/*/ 2>/dev/null | sed 's|clienti/||g' | sed 's|/||g' | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "list=$CLIENTS" >> $GITHUB_OUTPUT

  detect-clients:
    needs: fetch-clients
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.data }}
    steps:
      - name: Generate matrix
        id: matrix
        run: |
          if [ "${{ github.event.inputs.client }}" = "all" ]; then
            MATRIX='${{ needs.fetch-clients.outputs.clients }}'
          else
            MATRIX='["${{ github.event.inputs.client }}"]'
          fi
          echo "data={\"client\":$(echo $MATRIX | jq -c .)}" >> $GITHUB_OUTPUT

  build:
    needs: detect-clients
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-clients.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare repository name
        id: repo
        run: echo "lowercase_repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug - lista file
        run: |
           echo "=== ROOT ===" && ls -la
           echo "=== CLIENTI ===" && ls -la clienti/
           echo "=== BASE ===" && ls -la base/ || echo "base/ non esiste!"

      - name: Verify Files
        run: |
          ls -d base/extensions
          ls -d clienti/${{ matrix.client }}    

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # SOLUZIONE: Impostiamo il contesto alla ROOT del progetto
          context: .
          # Indichiamo esplicitamente dove si trova il Dockerfile del cliente
          file: ./clienti/${{ matrix.client }}/Dockerfile
          push: true
          build-args: |
            KEYCLOAK_VERSION=${{ github.event.inputs.keycloak_version }}
            CLIENT_ID=${{ matrix.client }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.lowercase_repo }}/keycloak-${{ matrix.client }}:${{ github.event.inputs.keycloak_version }}
            ${{ env.REGISTRY }}/${{ env.lowercase_repo }}/keycloak-${{ matrix.client }}:latest
          labels: |
            org.opencontainers.image.title=Keycloak-${{ matrix.client }}
            org.opencontainers.image.version=${{ github.event.inputs.keycloak_version }}