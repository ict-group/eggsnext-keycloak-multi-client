name: Build Keycloak Images

on:
  push:
    branches:
      - main
    paths:
      - 'clienti/**'
      - 'base/**'
      - 'Dockerfile'
      - 'Dockerfile.legacy'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:
    inputs:
      client:
        description: 'Seleziona cliente'
        required: true
        type: choice
        options:
          - all
          - errevi
          - errezeta
          - papalini
          - poma
          - cps
          - consoli
          - admvetro
          - eggsnext
          - eter
          - proges
          - ict-group
      keycloak_version:
        description: 'Versione Keycloak'
        required: true
        type: choice
        options:
          - 26.6.1
          - 25.0.6
          - 24.0.5
          - 23.0.7
          - 22.0.5
          - 21.1.2
          - 20.0.5
          - 19.0.3
          - 18.0.2
          - 16.1.1
          - 15.1.1
          - 12.0.4
          - 11.0.0
      keycloak_version_manual:
        description: 'Oppure inserisci versione manuale X.Y.Z; ha priorità sul dropdown'
        required: false
        type: string
      include_extensions:
        description: 'Copia anche base/extensions? Usare solo se i provider sono compatibili con questa versione'
        required: true
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'

env:
  REGISTRY: ghcr.io
  DEFAULT_KEYCLOAK_VERSION: 26.6.1

jobs:
  fetch-clients:
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.clients.outputs.list }}
    steps:
      - uses: actions/checkout@v4

      - name: List clients
        id: clients
        run: |
          set -euo pipefail
          CLIENTS=$(find clienti -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort | jq -R -s -c 'split("\n")[:-1]')
          if [ "$CLIENTS" = "[]" ]; then
            echo "❌ Nessun cliente trovato sotto clienti/"
            exit 1
          fi
          echo "list=$CLIENTS" >> "$GITHUB_OUTPUT"

  detect-clients:
    needs: fetch-clients
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.data }}
    steps:
      - name: Generate matrix
        id: matrix
        run: |
          set -euo pipefail
          CLIENT_INPUT="${{ github.event.inputs.client }}"

          # Su push non esistono input: builda tutti i clienti.
          if [ -z "$CLIENT_INPUT" ] || [ "$CLIENT_INPUT" = "all" ]; then
            MATRIX='${{ needs.fetch-clients.outputs.clients }}'
          else
            MATRIX="[\"$CLIENT_INPUT\"]"
          fi

          echo "data={\"client\":$(echo "$MATRIX" | jq -c .)}" >> "$GITHUB_OUTPUT"

  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      major: ${{ steps.resolve.outputs.major }}
      dockerfile: ${{ steps.resolve.outputs.dockerfile }}
      include_extensions: ${{ steps.resolve.outputs.include_extensions }}
    steps:
      - name: Resolve and validate Keycloak version
        id: resolve
        run: |
          set -euo pipefail

          MANUAL="${{ github.event.inputs.keycloak_version_manual }}"
          DROPDOWN="${{ github.event.inputs.keycloak_version }}"
          INCLUDE_EXTENSIONS="${{ github.event.inputs.include_extensions }}"

          if [ -z "$INCLUDE_EXTENSIONS" ]; then
            INCLUDE_EXTENSIONS="false"
          fi

          if [ -n "$MANUAL" ]; then
            VERSION="$MANUAL"
            echo "Usando versione manuale: $VERSION"
          elif [ -n "$DROPDOWN" ]; then
            VERSION="$DROPDOWN"
            echo "Usando versione da dropdown: $VERSION"
          else
            VERSION="${DEFAULT_KEYCLOAK_VERSION}"
            echo "Push senza input: uso DEFAULT_KEYCLOAK_VERSION=$VERSION"
          fi

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Formato versione non valido: '$VERSION'. Usa X.Y.Z, per esempio 11.0.0"
            exit 1
          fi

          MAJOR="$(echo "$VERSION" | cut -d. -f1)"

          if [ "$MAJOR" -ge 17 ]; then
            DOCKERFILE="./Dockerfile"
            echo "🐳 Dockerfile moderno Quarkus: $DOCKERFILE"
          else
            DOCKERFILE="./Dockerfile.legacy"
            echo "🐳 Dockerfile legacy WildFly: $DOCKERFILE"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"
          echo "include_extensions=$INCLUDE_EXTENSIONS" >> "$GITHUB_OUTPUT"

  build:
    needs:
      - detect-clients
      - resolve-version
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-clients.outputs.matrix) }}
      fail-fast: false

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare repository name
        run: |
          echo "lowercase_repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify files
        run: |
          set -euo pipefail
          echo "Dockerfile scelto: ${{ needs.resolve-version.outputs.dockerfile }}"
          test -f "${{ needs.resolve-version.outputs.dockerfile }}"
          test -d "clienti/${{ matrix.client }}/themes"

          echo "Temi trovati per ${{ matrix.client }}:"
          find "clienti/${{ matrix.client }}/themes" -mindepth 1 -maxdepth 1 -type d -printf ' - %f\n' | sort

          if [ -d base/extensions ]; then
            echo "base/extensions presente"
            find base/extensions -maxdepth 2 -type f | sort
          else
            echo "base/extensions assente: ok, le estensioni sono opzionali"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ needs.resolve-version.outputs.dockerfile }}
          push: true
          build-args: |
            KEYCLOAK_VERSION=${{ needs.resolve-version.outputs.version }}
            CLIENT_ID=${{ matrix.client }}
            INCLUDE_EXTENSIONS=${{ needs.resolve-version.outputs.include_extensions }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.lowercase_repo }}/keycloak-${{ matrix.client }}:${{ needs.resolve-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.lowercase_repo }}/keycloak-${{ matrix.client }}:latest
          labels: |
            org.opencontainers.image.title=Keycloak-${{ matrix.client }}
            org.opencontainers.image.version=${{ needs.resolve-version.outputs.version }}