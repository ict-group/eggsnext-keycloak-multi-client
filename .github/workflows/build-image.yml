name: Build Keycloak Images

on:
  push:
    branches: [main]
    paths:
      - 'clients/**'
  workflow_dispatch:
    inputs:
      client:
        description: '🎯 Seleziona cliente'
        required: true
        type: choice
        options:
          - all
          - errevi
          - errezeta
          - papalini
          - poma
      keycloak_version:
        description: '📦 Seleziona versione Keycloak (aggiornate quotidianamente)'
        required: true
        type: choice
        options:
          # ⬇️ AGGIORNATE AUTOMATICAMENTE OGNI GIORNO
          - 24.0.0
          - 23.0.1
          - 22.0.0
          - 21.1.2
          - 20.0.3

env:
  REGISTRY: ghcr.io

jobs:
  fetch-clients:
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.clients.outputs.list }}
    steps:
      - uses: actions/checkout@v4
      - name: List clients
        id: clients
        run: |
          CLIENTS=$(ls -d clients/*/ 2>/dev/null | sed 's|clients/||g' | sed 's|/||g' | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "list=$CLIENTS" >> $GITHUB_OUTPUT

  detect-clients:
    needs: fetch-clients
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.data }}
    steps:
      - name: Generate matrix
        id: matrix
        run: |
          if [ "${{ github.event.inputs.client }}" = "all" ]; then
            MATRIX='${{ needs.fetch-clients.outputs.clients }}'
          else
            MATRIX='["${{ github.event.inputs.client }}"]'
          fi
          echo "data={\"client\":$(echo $MATRIX | jq -c .)}" >> $GITHUB_OUTPUT

  build:
    needs: detect-clients
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-clients.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./clients/${{ matrix.client }}
          push: true
          build-args: |
            KEYCLOAK_VERSION=${{ github.event.inputs.keycloak_version }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/keycloak-${{ matrix.client }}:${{ github.event.inputs.keycloak_version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/keycloak-${{ matrix.client }}:${{ github.event.inputs.keycloak_version }}-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/keycloak-${{ matrix.client }}:latest
          labels: |
            org.opencontainers.image.title=Keycloak-${{ matrix.client }}
            org.opencontainers.image.version=${{ github.event.inputs.keycloak_version }}
            org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Image Summary
        run: |
          echo "✅ Build completato!"
          echo ""
          echo "📊 Dettagli:"
          echo "   Cliente: ${{ matrix.client }}"
          echo "   Versione: ${{ github.event.inputs.keycloak_version }}"
          echo "   Registry: ${{ env.REGISTRY }}"