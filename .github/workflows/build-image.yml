name: Build Keycloak Images
on:
  push:
    branches:
      - main
    paths:
      - 'clienti/**'
  workflow_dispatch:
    inputs:
      client:
        description: 'Seleziona cliente'
        required: true
        type: choice
        options:
          - all
          - errevi
          - errezeta
          - papalini
          - poma
          - cps
          - consoli
          - admvetro
          - eggsnext
          - eter
          - proges
          - ict-group
      keycloak_version:
        description: 'Versione Keycloak (dropdown)'
        required: true
        type: choice
        options:
          - 26.6.1
          - 25.0.6
          - 24.0.5
          - 23.0.7
          - 22.0.5
          - 21.1.2
          - 20.0.5
          - 19.0.3
          - 18.0.2
      keycloak_version_manual:
        description: 'Oppure inserisci versione manuale (es. 11.0.0) — ha priorità sul dropdown se compilata'
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  fetch-clients:
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.clients.outputs.list }}
    steps:
      - uses: actions/checkout@v4
      - name: List clients
        id: clients
        run: |
          CLIENTS=$(ls -d clienti/*/ 2>/dev/null | sed 's|clienti/||g' | sed 's|/||g' | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "list=$CLIENTS" >> $GITHUB_OUTPUT

  detect-clients:
    needs: fetch-clients
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.data }}
    steps:
      - name: Generate matrix
        id: matrix
        run: |
          if [ "${{ github.event.inputs.client }}" = "all" ]; then
            MATRIX='${{ needs.fetch-clients.outputs.clients }}'
          else
            MATRIX='["${{ github.event.inputs.client }}"]'
          fi
          echo "data={\"client\":$(echo $MATRIX | jq -c .)}" >> $GITHUB_OUTPUT

  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate Keycloak version
        id: resolve
        run: |
          MANUAL="${{ github.event.inputs.keycloak_version_manual }}"
          DROPDOWN="${{ github.event.inputs.keycloak_version }}"

          # Priorità: manuale se compilata, altrimenti dropdown
          if [ -n "$MANUAL" ]; then
            VERSION="$MANUAL"
            echo "Usando versione manuale: $VERSION"
          else
            VERSION="$DROPDOWN"
            echo "Usando versione da dropdown: $VERSION"
          fi

          # Validazione formato X.Y.Z (solo se versione manuale)
          if [ -n "$MANUAL" ]; then
            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "❌ Formato versione non valido: '$VERSION'. Usa il formato X.Y.Z (es. 11.0.0)"
              exit 1
            fi

            echo "🔍 Verifico versione '$VERSION' su GitHub releases..."
            GITHUB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/keycloak/keycloak/releases/tags/$VERSION")

            if [ "$GITHUB_STATUS" = "200" ]; then
              echo "✅ Versione '$VERSION' trovata su GitHub releases"
            else
              echo "⚠️  Versione '$VERSION' non trovata su GitHub (HTTP $GITHUB_STATUS) — verifico su Quay.io (versioni legacy)..."

              QUAY_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                "https://quay.io/v2/keycloak/keycloak/manifests/$VERSION")

              if [ "$QUAY_STATUS" = "200" ] || [ "$QUAY_STATUS" = "401" ]; then
                # 401 su Quay.io significa che il tag esiste ma richiede auth per il manifest
                # (comportamento normale per registry pubblici con autenticazione opzionale)
                echo "✅ Versione '$VERSION' trovata su Quay.io (legacy)"
              else
                echo "❌ Versione Keycloak '$VERSION' non trovata né su GitHub né su Quay.io"
                echo "   Controlla manualmente:"
                echo "   - https://github.com/keycloak/keycloak/releases/tag/$VERSION"
                echo "   - https://quay.io/repository/keycloak/keycloak?tab=tags"
                exit 1
              fi
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: [detect-clients, resolve-version]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-clients.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare repository name
        id: repo
        run: echo "lowercase_repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug - lista file
        run: |
          echo "=== ROOT ===" && ls -la
          echo "=== CLIENTI ===" && ls -la clienti/
          echo "=== BASE ===" && ls -la base/ || echo "base/ non esiste!"

      - name: Verify Files
        run: |
          ls -d base/extensions
          ls -d clienti/${{ matrix.client }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            KEYCLOAK_VERSION=${{ needs.resolve-version.outputs.version }}
            CLIENT_ID=${{ matrix.client }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.lowercase_repo }}/keycloak-${{ matrix.client }}:${{ needs.resolve-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.lowercase_repo }}/keycloak-${{ matrix.client }}:latest
          labels: |
            org.opencontainers.image.title=Keycloak-${{ matrix.client }}
            org.opencontainers.image.version=${{ needs.resolve-version.outputs.version }}