services:
  keycloak:
    image: ${REGISTRY_PREFIX:-}keycloak-${CLIENT_ID}:${KEYCLOAK_VERSION:-26.6.1}
    build:
      context: .
      dockerfile: ${KEYCLOAK_DOCKERFILE:-Dockerfile}
      args:
        KEYCLOAK_VERSION: ${KEYCLOAK_VERSION:-26.6.1}
        CLIENT_ID: ${CLIENT_ID}

    container_name: keycloak-${CLIENT_ID}-${KEYCLOAK_VERSION:-26.6.1}

    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"

    env_file:
      - ./clienti/${CLIENT_ID}/${CLIENT_ID}.env

    environment:
      # --- Credenziali admin ---
      # WildFly (< 17)
      KEYCLOAK_USER: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-Expert0.}
      # Quarkus (>= 17)
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-Expert0.}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-Expert0.}
      # --- DB ---
      # Quarkus (>= 17)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME:-keycloak_${CLIENT_ID}}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-Expert0.}
      # WildFly (< 17)
      DB_VENDOR: postgres
      DB_ADDR: postgres
      DB_PORT: 5432
      DB_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak_${CLIENT_ID}}
      DB_USER: ${KEYCLOAK_DB_USER:-keycloak}
      DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-Expert0.}
      # --- JVM (WildFly < 17) ---
      JAVA_OPTS: "-server -Xms256m -Xmx2048m -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m -Djava.net.preferIPv4Stack=true -Djboss.modules.system.pkgs=org.jboss.byteman -Djava.awt.headless=true -Dkeycloak.theme.cacheThemes=false -Dkeycloak.theme.cacheTemplates=false --add-exports=java.base/sun.nio.ch=ALL-UNNAMED --add-exports=jdk.unsupported/sun.misc=ALL-UNNAMED --add-exports=jdk.unsupported/sun.reflect=ALL-UNNAMED"
      # --- Rete ---
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: none

    volumes:
      - ${KEYCLOAK_THEMES_VOLUME:-./clienti/${CLIENT_ID}/themes:/opt/keycloak/themes}

    # Il command viene iniettato dallo script in base alla versione
    command: ${KEYCLOAK_CMD:-start-dev --spi-theme-static-max-age=-1 --spi-theme-cache-themes=false --spi-theme-cache-templates=false}

    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: postgres-${CLIENT_ID}

    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak_${CLIENT_ID}}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-Expert0.}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak_${CLIENT_ID}}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit-${CLIENT_ID}

    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_WEB_PORT:-8025}:8025"

volumes:
  postgres-data:
    name: keycloak-postgres-${CLIENT_ID}